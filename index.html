<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe | Premium Edition</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-animation"></div>
    <div class="particles" id="particles"></div>
    
    <div class="glass-container fade-in">
        <div class="header">
            <h1 class="neon-title">Tic Tac Toe</h1>
            <div class="mode-selector">
                <button id="modeAiBtn" class="mode-btn active">Vs AI</button>
                <button id="modePvpBtn" class="mode-btn">1v1</button>
            </div>
            <div class="status-display" id="statusDisplay">Player <span class="neon-x">X</span>'s turn</div>
        </div>
        
        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>
        
        <div class="controls">
            <button id="resetBtn" class="glow-on-hover">Restart Game</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
